<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>习惯详情 · 方案 B 日课印章</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --paper:#f6f0e3; --paper-2:#fbf7ee; --ink:#2b2722; --ink-soft:#6b6358;
    --faint:#a99f8c; --rule:#ddd0b6; --seal:#c0432b; --seal-soft:#e9c9c0;
    --serif:"Noto Serif SC", "Songti SC", serif;
    --ui:-apple-system,"PingFang SC",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:#d9d2c2;font-family:var(--serif);color:var(--ink);
    min-height:100vh;display:grid;place-items:center;padding:40px}
  .caption{position:fixed;top:16px;left:20px;font-size:12px;color:#8c8472;font-family:var(--ui)}
  .caption b{color:#3a352c;font-weight:600}

  .panel{width:600px;background:var(--paper);border-radius:6px;padding:30px 34px 34px;
    border:1px solid #e4dac4;
    box-shadow:0 1px 0 rgba(255,255,255,.6) inset, 0 22px 50px -30px rgba(60,45,20,.6);
    background-image:radial-gradient(rgba(120,100,60,.04) 1px,transparent 0);background-size:14px 14px}

  .eyebrow{display:flex;justify-content:space-between;align-items:center;
    font-size:12px;letter-spacing:.35em;color:var(--faint);margin-bottom:18px;font-family:var(--ui)}
  .eyebrow .ops{display:flex;gap:14px;letter-spacing:0}
  .eyebrow .ops a{color:var(--ink-soft);text-decoration:none;cursor:pointer}
  .eyebrow .ops a:hover{color:var(--seal)}

  .band{display:flex;gap:24px;align-items:stretch;margin-bottom:22px}
  .daystamp{flex:0 0 96px;border:1.5px solid var(--rule);border-radius:4px;
    padding:14px 0;text-align:center;background:var(--paper-2);position:relative}
  .daystamp .m{font-size:14px;color:var(--ink-soft);letter-spacing:.1em}
  .daystamp .d{font-size:40px;font-weight:600;line-height:1.05;margin:2px 0}
  .daystamp .w{font-size:12px;color:var(--faint)}
  .daystamp .seal{position:absolute;right:-9px;top:-9px;width:34px;height:34px;border-radius:50%;
    background:var(--seal);color:#fff;display:grid;place-items:center;font-size:13px;
    transform:rotate(-8deg);box-shadow:0 2px 6px rgba(150,40,20,.35)}

  .band-r{flex:1;min-width:0;display:flex;flex-direction:column}
  .hname{font-size:30px;font-weight:600;letter-spacing:.02em;display:flex;align-items:center;gap:10px}
  .hname .e{font-size:24px}
  .rule{height:1px;background:var(--rule);margin:12px 0 14px}
  .beads{display:flex;align-items:center;gap:12px;margin-top:auto}
  .beads .dots{display:flex;gap:7px}
  .beads .dots i{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--seal);display:block}
  .beads .dots i.on{background:var(--seal)}
  .beads .ctrl{display:flex;gap:6px;margin-left:auto}
  .beads .ctrl button{width:30px;height:30px;border:1.5px solid var(--rule);border-radius:50%;
    background:var(--paper-2);color:var(--ink-soft);font-size:16px;cursor:pointer;font-family:var(--ui)}
  .beads .ctrl button:hover{border-color:var(--seal);color:var(--seal)}
  .beads .label{font-size:13px;color:var(--ink-soft)}

  .stats{display:flex;gap:26px;font-size:15px;color:var(--ink-soft);margin-bottom:22px;
    padding-left:2px}
  .stats b{font-weight:600;color:var(--ink);font-size:19px;margin-right:3px}

  .cal-h{display:flex;justify-content:space-between;align-items:center;
    font-size:13px;color:var(--ink-soft);margin-bottom:10px}
  .cal-h .nav{cursor:pointer;color:var(--faint);padding:0 6px}
  .wk{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
  .wk span{text-align:center;font-size:11px;color:var(--faint);font-family:var(--ui)}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .cell{aspect-ratio:1;border-radius:4px;display:grid;place-items:center;position:relative;
    font-size:13px;color:var(--faint);font-family:var(--ui)}
  .cell.in{color:var(--ink-soft)}
  .cell.done{color:#fff}
  .cell.done::before{content:"";position:absolute;inset:4px;border-radius:50%;
    background:var(--seal);transform:rotate(-6deg);
    box-shadow:0 1px 3px rgba(150,40,20,.3)}
  .cell.done span{position:relative;z-index:1}
  .cell.part::after{content:"";position:absolute;inset:5px;border-radius:50%;
    border:1.5px dashed var(--seal-soft)}
  .cell.today{box-shadow:inset 0 0 0 1.5px var(--seal)}
</style>
</head>
<body>
<div class="caption">习惯详情 · 方案 <b>B — 日课印章（黄历感）</b>　（核心：把“打卡”还原成盖印章，纸感 + 衬线 + 朱砂印）</div>

<section class="panel">
  <div class="eyebrow"><span>日 课 · 打 卡</span><span class="ops"><a>编辑</a><a>归档</a><a>删除</a></span></div>

  <div class="band">
    <div class="daystamp">
      <div class="m">六月</div>
      <div class="d">卅</div>
      <div class="w">星期二</div>
      <div class="seal">今</div>
    </div>
    <div class="band-r">
      <div class="hname"><span class="e">💧</span>每天喝水</div>
      <div class="rule"></div>
      <div class="beads">
        <div class="dots"><i class="on"></i><i class="on"></i><i class="on"></i><i class="on"></i><i class="on"></i><i></i><i></i><i></i></div>
        <span class="ctrl">
          <span class="label">5/8 杯</span>
          <button>−</button><button>＋</button>
        </span>
      </div>
    </div>
  </div>

  <div class="stats">
    <div><b>12</b>连续日</div>
    <div><b>86</b>累计日</div>
    <div><b>18</b>本月已打卡</div>
  </div>

  <div class="cal-h"><span class="nav">‹</span><span>二〇二六年 · 六月</span><span class="nav">›</span></div>
  <div class="wk"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span></div>
  <div class="cal" id="cal"></div>
</section>

<script>
  const done = new Set([1,2,4,5,6,8,9,10,12,13,15,16,17,19,20,22,23,24,26,27,29,30]);
  const part = new Set([3,11,18,25]);
  const today = 30, lead = 0; // 2026-06-01 是周一
  const cal = document.getElementById('cal');
  for(let i=0;i<lead;i++) cal.appendChild(document.createElement('div'));
  for(let d=1; d<=30; d++){
    const c=document.createElement('div');
    c.className='cell in'+(done.has(d)?' done':'')+(part.has(d)?' part':'')+(d===today?' today':'');
    c.innerHTML=`<span>${d}</span>`;
    cal.appendChild(c);
  }
</script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>习惯详情 · 方案 D 离散单位</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#15202b; --soft:#54616e; --muted:#8b97a3; --faint:#b9c2cb;
    --line:#e6eaee; --panel:#fff; --bg:#eaeef2;
    --accent:#2b86c5; --water-1:#86cdee; --water-2:#2f93d4; --empty:#eef2f6;
    --flame:#e08a3c;
    --num:"Sora",ui-rounded,-apple-system,system-ui,sans-serif;
    --ui:-apple-system,BlinkMacSystemFont,"PingFang SC",system-ui,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font-family:var(--ui);color:var(--ink);
    min-height:100vh;display:grid;place-items:center;padding:40px}
  .caption{position:fixed;top:16px;left:20px;font-size:12px;color:var(--muted)}
  .caption b{color:var(--ink);font-weight:600}

  .panel{width:600px;background:var(--panel);border:1px solid var(--line);
    border-radius:18px;padding:26px 30px 30px;box-shadow:0 22px 56px -38px rgba(20,40,60,.55)}

  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .title{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:600;letter-spacing:-.01em}
  .title .e{font-size:24px}
  .tools{display:flex;gap:4px}
  .tools button{width:30px;height:30px;border:0;border-radius:8px;background:transparent;
    color:var(--muted);cursor:pointer}
  .tools button:hover{background:#eef2f6;color:var(--ink)}
  .sub{font-size:12.5px;color:var(--muted);margin:2px 0 22px}

  .cups{display:flex;gap:10px;justify-content:center;align-items:flex-end;margin-bottom:18px}
  .cup{width:46px;height:58px;position:relative;cursor:pointer;
    clip-path:polygon(12% 0,88% 0,74% 100%,26% 100%);
    background:var(--empty);transition:transform .12s ease}
  .cup:hover{transform:translateY(-2px)}
  .cup i{position:absolute;left:0;right:0;bottom:0;height:100%;
    background:linear-gradient(var(--water-1),var(--water-2))}
  .cup.empty i{display:none}
  .cup::after{content:"";position:absolute;inset:0;clip-path:inherit;
    box-shadow:inset 0 0 0 1.5px rgba(43,134,197,.22)}

  .counter{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:24px}
  .counter button{width:44px;height:44px;border:1px solid var(--line);border-radius:14px;
    background:#fbfdff;color:var(--soft);font-size:22px;cursor:pointer}
  .counter button:hover{border-color:var(--accent);color:var(--accent)}
  .counter .read{font-family:var(--num);font-size:17px;font-weight:600;min-width:96px;text-align:center}
  .counter .read small{color:var(--faint);font-weight:500}

  .pills{display:flex;gap:9px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 13px;
    border-radius:16px;background:#f1f5f8;font-size:12.5px;color:var(--soft)}
  .pill b{font-family:var(--num);font-weight:600;color:var(--ink)}
  .pill.flame b{color:var(--flame)}

  .month{border-top:1px solid var(--line);padding-top:18px}
  .month-h{display:flex;justify-content:space-between;align-items:center;
    font-size:12px;color:var(--muted);margin-bottom:11px}
  .month-h .nav{cursor:pointer;color:var(--faint);padding:0 6px}
  .chips{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .chip{aspect-ratio:1;border-radius:8px;background:#f0f3f6;display:grid;place-items:center;
    font-size:11px;color:var(--faint);font-variant-numeric:tabular-nums}
  .chip.done{background:linear-gradient(var(--water-1),var(--water-2));color:#fff;font-weight:600}
  .chip.part{background:color-mix(in srgb,var(--accent) 16%,#fff);color:var(--accent)}
  .chip.today{outline:2px solid var(--accent);outline-offset:1px}
</style>
</head>
<body>
<div class="caption">习惯详情 · 方案 <b>D — 离散杯格（计量直给）</b>　（核心：把“8 杯”画成 8 个可点的杯子；打卡型习惯则对应一个大圆）</div>

<section class="panel">
  <div class="head">
    <div class="title"><span class="e">💧</span> 每天喝水</div>
    <div class="tools"><button>✏️</button><button>🗄️</button><button>🗑️</button></div>
  </div>
  <div class="sub">今天的目标 · 8 杯 · 点杯子或用 ± 打卡</div>

  <div class="cups" id="cups"></div>

  <div class="counter">
    <button>−</button>
    <div class="read">5<small> / 8 杯</small></div>
    <button>＋</button>
  </div>

  <div class="pills">
    <span class="pill flame">🔥 <b>12</b> 连续天</span>
    <span class="pill">🏆 <b>86</b> 累计天</span>
    <span class="pill">📅 本月 <b>18</b> 天</span>
  </div>

  <div class="month">
    <div class="month-h"><span class="nav">‹</span><span>2026年6月 · 达标 18 天</span><span class="nav">›</span></div>
    <div class="chips" id="chips"></div>
  </div>
</section>

<script>
  const filled=5, total=8;
  const cups=document.getElementById('cups');
  for(let i=0;i<total;i++){
    const c=document.createElement('div'); c.className='cup'+(i<filled?'':' empty');
    c.innerHTML='<i></i>'; cups.appendChild(c);
  }
  const done=new Set([1,2,4,5,6,8,9,10,12,13,15,16,17,19,20,22,23,24,26,27,29,30]);
  const part=new Set([3,11,18,25]); const today=30;
  const chips=document.getElementById('chips');
  for(let d=1;d<=30;d++){
    const c=document.createElement('div');
    c.className='chip'+(done.has(d)?' done':part.has(d)?' part':'')+(d===today?' today':'');
    c.textContent=d; chips.appendChild(c);
  }
</script>
</body>
</html>
